spring:
  application:
    name: agro-labor-api
  datasource:
    url: jdbc:postgresql://${DB_SERVERNAME}:${DB_PORT}/${DB_NAME_LABOR}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    hibernate:
      ddl-auto: validate
    database: POSTGRESQL
